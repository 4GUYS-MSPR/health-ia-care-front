name: 🐛 Bug Report
description: Report a reproducible bug
labels: [bug]

body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug
      placeholder: "App crashes when…"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Full Description
      description: Provide a concise narrative of the issue. What happens and where?
      placeholder: "When I tap the Settings icon from the dashboard the app immediately closes with no visible error. Started after updating to v1.2.0."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact, minimal steps we can follow to reproduce.
      placeholder: |
        1. Launch app
        2. Login as demo user
        3. Tap the Settings gear (top-right)
        4. Observe crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you thought should happen instead.
      placeholder: "Settings screen opens successfully."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / Error Output
      description: What actually happened, including any error messages.
      placeholder: "App closes and relaunches splash. Logcat shows NullPointerException in SettingsController.init()."
    validations:
      required: true

  - type: input
    id: frequency
    attributes:
      label: Reproducibility
      description: How often does it occur?
      placeholder: "Always / Often (~70%) / Rare (once)"

  - type: dropdown
    id: severity
    attributes:
      label: Impact Severity
      description: How much does this affect users?
      options:
        - blocker
        - critical
        - major
        - minor
        - trivial
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment / Platform Details
      description: Include only relevant details (versions / device / runtime).
      placeholder: |
        App version: v1.2.0
        Platform(s): Android 14 (Pixel 7), iOS 17.0 (iPhone 13)
        Device locale: en-US
        Network: WiFi
        Flutter: 3.35.0
        Backend API: prod

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace
      description: Paste relevant log lines only (wrap in backticks if large). Avoid sensitive data.
      placeholder: |
        E/SettingsController: Null pointer at line 58...
        # Stack trace here

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recording
      description: Drag & drop images or recordings that clarify the issue.
      placeholder: "(Attach visual evidence if helpful)"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other notes, hypotheses, related issues, or links.
      placeholder: "Possibly related to recent refactor of SettingsController."

  - type: checkboxes
    id: confirmations
    attributes:
      label: Pre-Submission Checklist
      description: Please confirm.
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: I have provided sufficient reproduction detail.
          required: true
        - label: I am not including sensitive credentials or personal data.
          required: true
